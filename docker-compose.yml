version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: stratos_postgres
    environment:
      POSTGRES_USER: stratos
      POSTGRES_PASSWORD: stratos
      POSTGRES_DB: stratos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: stratos_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
